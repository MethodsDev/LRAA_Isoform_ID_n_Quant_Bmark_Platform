    family: FLAIR
    quant_pattern: 'flair-v3\.0\.0\.counts\.tsv$'
    quant_id_col: 0
    quant_tpm_col: 1
    color: pink
    display: true
    venn: true

  - name: FLAIR-v2.0.0
    family: FLAIR
    quant_pattern: 'flair-v2\.0\.0\.counts\.tsv$'
    quant_id_col: 0
    quant_tpm_col: 1
    gtf_pattern: 'flair-v2\.0\.0\.gtf$'
    color: hotpink
    display: true
    venn: false

  ###############
  ## StringTie ##
  ###############

  - name: StringTie-v3.0.3
    family: StringTie
    quant_pattern: 'stringtie-v3\.0\.3\.stringtie\.quant\.tsv$'
    quant_id_col: 1
    quant_tpm_col: 4
    # v3.0.3 emits a header row; the older v2.2.3 does not.
    quant_no_header: false
    gtf_pattern: 'stringtie-v3\.0\.3\.stringtie\.gtf$'
    color: aquamarine
    display: true
    venn: true

  - name: StringTie-v2.2.3
    family: StringTie
    quant_pattern: 'stringtie-v2\.2\.3\.stringtie\.quant\.tsv$'
    quant_id_col: 1
    quant_tpm_col: 4
    quant_no_header: true
    gtf_pattern: 'stringtie-v2\.2\.3\.stringtie\.gtf$'
    color: lightseagreen
    display: true
    venn: false

  ###########################
  ## Oarfish - byAlignment ##
  ###########################

  - name: Oarfish_align-v0.9.4
    family: Oarfish_align
    quant_pattern: 'oarfish-v0\.9\.4\.Oarfish\.byAlignment\.quant$'
    quant_id_col: 0
    quant_tpm_col: 2
    color: khaki
