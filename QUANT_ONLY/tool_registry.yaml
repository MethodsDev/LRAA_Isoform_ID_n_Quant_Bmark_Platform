# QUANT_ONLY benchmarking tool registry
#
# Single source of truth for parsing rules and display config.
# Adding a new tool or a new version of an existing tool means
# adding an entry here -- no code changes anywhere else.
#
# Schema:
#   name             Unique label that appears in plots and in the
#                    `name` column of every aggregated TSV. Becomes the
#                    basename of processed_prog_results/<name>.tsv (and
#                    <name>.gtf if a gtf_pattern is given).
#   family           Tool family used for grouping versions.
#   quant_pattern    Regex matched against the basename of files in
#                    raw_prog_results/. First matching entry wins (so
#                    list more-specific versioned patterns BEFORE the
#                    less-specific fallback for the same family).
#   quant_id_col     0-indexed column holding the transcript_id.
#   quant_tpm_col    0-indexed column holding the read count or TPM
#                    (the value is re-normalized to sum to 1M per file).
#   quant_skip_rows  Lines to skip before the header row (default: 0).
#   quant_no_header  true if the quant file has no header row
#                    (default: false).
#   gtf_pattern      (optional) regex for the program-specific GTF.
#                    Recognizing the file suppresses deposit-time
#                    warnings about unmatched files. Whether the
#                    notebook actually USES this GTF is controlled by
#                    gtf_source.
#   gtf_source       "ref" (default) or "own". "ref" means the notebook
#                    keys the entry off REF_gtf when deriving introns
#                    -- correct for tools that quantify against the
#                    reference annotation (LRAA-quant-only, IsoQuant,
#                    Oarfish, FLAIR, StringTie, ESPRESSO, Bambu).
#                    "own" means the entry keys off its own GTF --
#                    correct for tools that emit private transcript
#                    IDs (FLAMES, IsoSeq, Mandalorion, Isosceles,
#                    TALON). Requires gtf_pattern.
#   gtf_converter    (optional) "flames_gff3" runs the FLAMES gff3->gtf
#                    converter; otherwise the raw GTF is used as-is.
#   quant_preference (optional) ordered list of regexes used to break ties
#                    when multiple quant files match the same entry; lower
#                    list index wins. If omitted, multiple quant matches are
#                    treated as an error.
#   gtf_preference   (optional) ordered list of regexes used to break ties
#                    when multiple GTF files match the same entry; lower
#                    list index wins. If omitted, multiple GTF matches are
#                    treated as an error.
#   color            Plot color (matplotlib named or hex).
#   display          true to plot/aggregate in the default report
#                    (default: true). Override via a report_set yaml.
#   venn             true to count this entry as a participating method
#                    in Venn-mode (--Venn_mode) truth-set agreement
#                    (default: true). Override via a report_set yaml.

tools:

  ##########
  ## LRAA ##
  ##########

  # Whichever LRAA version produced the .LRAA.*.quant.expr file in
  # raw_prog_results/ is the one that gets reported. We do not track
  # the LRAA version separately -- the deposit step is responsible
  # for ensuring only one LRAA file per sample is in raw_prog_results/.

  - name: LRAA-v0.17.5
    family: LRAA
    quant_pattern: 'LRAA\.v0\.17\.5\..*quant\.expr$'
    quant_id_col: 1
    quant_tpm_col: 3
    gtf_pattern: 'LRAA\.v0\.17\.5(\..*)?\.gtf$'
    color: teal
    display: true
    venn: true
  - name: LRAA-v0.17.4
    family: LRAA
    quant_pattern: 'LRAA\.v0\.17\.4\..*quant\.expr$'
    quant_id_col: 1
    quant_tpm_col: 3
    gtf_pattern: 'LRAA\.v0\.17\.4(\..*)?\.gtf$'
    color: teal
    display: true
    venn: false
  - name: LRAA-v0.17.2
    family: LRAA
    quant_pattern: 'LRAA\.v0\.17\.2\..*quant\.expr$'
    quant_id_col: 1
    quant_tpm_col: 3
    gtf_pattern: 'LRAA\.v0\.17\.2(\..*)?\.gtf$'
    color: teal
    display: true
    venn: false

  - name: LRAA-v0.15.0
    family: LRAA
    quant_pattern: 'LRAA\.v0\.15\.0\..*quant\.expr$'
    quant_id_col: 1
    quant_tpm_col: 3
    gtf_pattern: 'LRAA\.v0\.15\.0(\..*)?\.gtf$'
    color: teal
    display: true
    venn: false

