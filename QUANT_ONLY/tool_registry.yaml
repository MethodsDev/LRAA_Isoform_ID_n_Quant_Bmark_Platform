    quant_id_col: 0
    quant_tpm_col: 2
    color: sandybrown
    display: true
    venn: false

  ############
  ## FLAMES ##
  ############

  - name: FLAMES-v0.1
    family: FLAMES
    quant_pattern: 'flames-v0\.1\.FLAMES\.counts\.tsv$'
    quant_id_col: 1
    quant_tpm_col: 2
    gtf_pattern: 'flames-v0\.1\.FLAMES\.gff3$'
    gtf_converter: flames_gff3
    gtf_source: own
    color: gainsboro
    display: true
    venn: true

  ############
  ## IsoSeq ##
  ############

  - name: IsoSeq-v4.0.0
    family: IsoSeq
    quant_pattern: 'isoseq-v4\.0\.0\.IsoSeq.*\.abundance\.txt$'
    quant_id_col: 0
    quant_tpm_col: 2
    quant_skip_rows: 3
    quant_preference:
      - 'IsoSeq\.ref-filtered\.ID\.abundance\.txt$'
      - 'IsoSeq\.ref-free\.ID\.abundance\.txt$'
    gtf_pattern: 'isoseq-v4\.0\.0\.IsoSeq\.ref-(filtered|free)\.ID\.gff$'
    gtf_preference:
      - 'IsoSeq\.ref-filtered\.ID\.gff$'
      - 'IsoSeq\.ref-free\.ID\.gff$'
    gtf_source: own
    color: orchid
    display: true
    venn: true

